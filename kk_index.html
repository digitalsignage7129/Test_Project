<style>

  html, body {
    width: 100%;
    height: 100%;

    width: 676px;
    height: 558px;

    border: none;
    position: absolute;
    width: 1920px;
    height: 1080px;
    left: -693px;
    top: -204px;
  }
</style>
</head>
<body>
  <div class="crop">
    <iframe
      src="https://www2.edam.ne.jp/Public/00642/Sokutei/SSC/RN?LoID=738"
